<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Cadastro</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="container">

<h1>Cadastro</h1>

<form>

<label for="nome">

Nome

</label>

<input
id="nome"
class="form-control"
type="text"
required>

<br>

<label for="email">

E-mail

</label>

<input
id="email"
class="form-control"
type="email"
required>

<br>

<label for="cpf">

CPF

</label>

<input
id="cpf"
class="form-control"
required>

<br>

<label>

Sexo

</label>

<br>

<input
type="radio"
name="sexo">

Masculino

<input
type="radio"
name="sexo">

Feminino

<hr>

<label for="pet">

Nome do Pet

</label>

<input
id="pet"
class="form-control">

<br>

<label for="raca">

Raça

</label>

<input
id="raca"
class="form-control">

<br>

<label for="idade">

Idade

</label>

<input
id="idade"
type="number"
class="form-control">

<hr>

<select
class="form-select">

<option>Banho</option>

<option>Tosa</option>

<option>Banho e Tosa</option>

</select>

<br>

<input type="checkbox">

Tele-busca

<br>

<input type="checkbox">

Entrega no local

<br><br>

<label>Data</label>

<input
type="date"
class="form-control">

<br>

<label>Horário</label>

<input
type="time"
class="form-control">

<br>

<button
class="btn btn-success">

Enviar

</button>

</form>

</div>

</body>

</html>
