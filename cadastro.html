<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Cadastro</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="container">

<h1>Cadastro</h1>

<form>

<label for="nome">

Nome

</label>

<input
id="nome"
class="form-control"
required>

<br>

<label for="email">

E-mail

</label>

<input
id="email"
type="email"
class="form-control"
required>

<br>

<label for="cpf">

CPF

</label>

<input
id="cpf"
class="form-control">

<br>

<label>

Sexo

</label>

<br>

<input
type="radio"
name="sexo">

Masculino

<input
type="radio"
name="sexo">

Feminino

<hr>

<label>

Nome do Pet

</label>

<input
class="form-control">

<br>

<label>

Raça

</label>

<input
class="form-control">

<br>

<label>

Idade

</label>

<input
type="number"
class="form-control">

<hr>

<select
class="form-select">

<option>Banho</option>

<option>Tosa</option>

</select>

<br>

<input type="checkbox">

Tele-busca

<br>

<input type="checkbox">

Entrega local

<br><br>

<input
type="date"
class="form-control">

<br>

<input
type="time"
class="form-control">

<br>

<button
class="btn btn-success">

Agendar

</button>

</form>

</div>

</body>

</html>
